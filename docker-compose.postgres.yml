services:
  postgres:
    image: postgres:16-alpine
    container_name: job_complaint_postgres
    restart: "no"
    environment:
      POSTGRES_DB: job_complaint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - job_complaint_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_complaint"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  job_complaint_postgres_data:
